# This workflow automates PR triage by applying the 'status:needs-triage' label.
# It requires a GitHub Secret named `ORG_TRIAGE_TOKEN` with:
#   - Read access to the organization's repositories (to search PRs).
#   - Write access to the repositories (to apply labels).
#
name: Central Triage Cron

on:
  schedule:
    # Run every hour at minute 37
    - cron: "37 * * * *"
  workflow_dispatch:
    # Allow manual trigger with custom repo list and apply flag
    inputs:
      repos:
        description: "Comma-separated list of repos to triage (leave empty to use default repos; scheduled cron runs always use the default repos)"
        required: false
        default: ""
      apply:
        description: "Actually apply the 'status:needs-triage' label (manual runs only; scheduled cron runs always apply labels)"
        type: boolean
        required: false
        default: false

jobs:
  triage:
    runs-on: ubuntu-latest
    env:
      # Comma-separated list of repositories to triage by default when running on a schedule (cron).
      # Edit this list to configure which repositories are triaged automatically.
      DEFAULT_REPOS: "python-sdk, js-sdk, conformance, samples, ucp-schema, ucp"
    steps:
      - name: Check out central triage scripts
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Run Triage Labeling
        env:
          ORG_TRIAGE_TOKEN: ${{ secrets.ORG_TRIAGE_TOKEN }}
        run: |
          REPOS="${{ github.event.inputs.repos || env.DEFAULT_REPOS }}"

          if [ -z "$REPOS" ]; then
            echo "::error::No repositories specified for triage. Please configure DEFAULT_REPOS in the workflow or provide them via the manual trigger input."
            exit 1
          fi

          APPLY_FLAG=""
          # Automatically apply changes on scheduled runs, or if explicitly requested in a manual run.
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.apply }}" = "true" ]; then
            APPLY_FLAG="--apply"
          fi

          # Run using uv
          uv run org-tools/triage/scripts/triage_cli.py \
            --org "${{ github.repository_owner }}" \
            --repos "$REPOS" \
            $APPLY_FLAG
